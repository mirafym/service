<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо за заявку — Мастерская</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <style>
        .thanks-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0B0E14;
            padding: 40px;
        }
        .thanks-card {
            background: #1A1F2A;
            border-radius: 28px;
            padding: 48px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid #2D3A4A;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.3);
        }
        .thanks-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        .thanks-card h1 {
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
        }
        .thanks-card p {
            font-size: 16px;
            color: #CBD5E1;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .btn-back {
            background: #0066FF;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn-back:hover {
            background: #0052CC;
        }
    </style>
</head>
<body>
    <div class="thanks-page">
        <div class="thanks-card">
            <h1>Спасибо за заявку!</h1>
            <p>Мы получили ваше сообщение. <br>Наш мастер свяжется с вами в ближайшее время.</p>
            <a href="index.html" class="btn-back">Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
